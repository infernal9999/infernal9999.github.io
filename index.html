<!DOCTYPE html>
<html>
<head>
    <title>Spreadsheet Viewer</title>
    <script src="https://unpkg.com/exceljs/dist/exceljs.min.js"></script>
    <style>
        #spreadsheet {
            width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>
    <div id="spreadsheet"></div>

    <script>
        // Load the Excel file and retrieve data from a specific sheet
        var workbook = new ExcelJS.Workbook();
        workbook.xlsx.readFile('Wagon Detention Particulars - Magra (Updated_On_18_05_23).xlsx')
            .then(function () {
                var worksheet = workbook.getWorksheet('Sheet1');
                var sheetData = [];

                worksheet.eachRow(function (row) {
                    var rowData = [];
                    row.eachCell(function (cell) {
                        rowData.push(cell.value);
                    });
                    sheetData.push(rowData);
                });

                // Display the data on the webpage
                var container = document.getElementById('spreadsheet');
                var htmlTable = document.createElement('table');

                sheetData.forEach(function (rowData) {
                    var row = document.createElement('tr');

                    rowData.forEach(function (cellData) {
                        var cell = document.createElement('td');
                        cell.textContent = cellData;
                        row.appendChild(cell);
                    });

                    htmlTable.appendChild(row);
                });

                container.appendChild(htmlTable);
            });
    </script>
</body>
</html>
