<!DOCTYPE html>
<html>
<head>
    <title>Tesseract OCR</title>
</head>
<body>
    <h1>Tesseract OCR Demo</h1>
    <form enctype="multipart/form-data">
        <p>
            <label for="image">Select an image file:</label>
            <input type="file" id="image" name="image">
        </p>
        <p>
            <label for="lang">Select source language:</label>
            <select id="lang" name="lang">
                <option value="eng">English</option>
                <option value="deu">German</option>
                <option value="fra">French</option>
                <option value="spa">Spanish</option>
            </select>
        </p>
        <p>
            <button type="button" onclick="performOCR()">Perform OCR</button>
        </p>
    </form>
    <div id="result"></div>
    <script>
        function performOCR() {
            var image = document.getElementById('image').files[0];
            var lang = document.getElementById('lang').value;
            var formData = new FormData();
            formData.append('image', image);
            formData.append('source_lang', lang);
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/ocr', true);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var result = JSON.parse(xhr.responseText);
                    var text = result.text;
                    var coordinates = result.coordinates;
                    var html = '';
                    for (var i = 0; i < coordinates.length; i++) {
                        var coord = coordinates[i];
                        html += '<span style="position:absolute; left:' + coord.x1 + 'px; top:' + coord.y1 + 'px;">' + coord.text + '</span>';
                    }
                    document.getElementById('result').innerHTML = '<pre>' + text + '</pre>' + html;
                } else {
                    alert('Error performing OCR: ' + xhr.statusText);
                }
            };
            xhr.send(formData);
        }
    </script>
</body>
</html>
